<!DOCTYPE html>
<html>
<head>
  <title>Livestock Monitoring System</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f6f9;
      margin: 0;
      padding: 0;
    }

    h1 {
      background-color: #2c3e50;
      color: white;
      padding: 20px;
      margin: 0;
      text-align: center;
    }

    h2 {
      margin-top: 30px;
      text-align: center;
    }

    form {
      text-align: center;
      margin: 20px auto;
    }

    input {
      padding: 8px;
      margin: 5px;
      width: 180px;
    }

    button {
      padding: 8px 15px;
      background-color: #4CAF50;
      color: white;
      border: none;
      cursor: pointer;
    }

    button:hover {
      background-color: #45a049;
    }

    table {
      margin: 30px auto;
      border-collapse: collapse;
      width: 80%;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
    }

    th {
      background-color: #4CAF50;
      color: white;
    }

    /* CENTER DASHBOARD SECTION */
    .dashboard-wrapper {
      display: flex;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      margin-top: 40px;
    }

    .dashboard-container {
      width: 500px;
      text-align: center;
    }

    canvas {
      display: block;
      margin: 20px auto;
    }

    .analytics-box {
      padding: 20px;
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      margin-top: 20px;
    }
  </style>
</head>

<body>

  <h1>🐄 Livestock Monitoring System</h1>

  <h2>Add New Animal</h2>

  <form id="animalForm">
    <input type="text" id="name" placeholder="Animal Name" required>
    <input type="text" id="type" placeholder="Animal Type" required>
    <input type="number" id="temperature" placeholder="Temperature (°C)" required>
    <input type="number" id="heartRate" placeholder="Heart Rate" required>
    <button type="submit">Add Animal</button>
  </form>

  <table>
    <thead>
      <tr>
        <th>Name</th>
        <th>Type</th>
        <th>Temperature (°C)</th>
        <th>Heart Rate</th>
        <th>Status</th>
      </tr>
    </thead>
    <tbody id="animalTable"></tbody>
  </table>

  <!-- CENTERED GRAPHS + ANALYTICS -->
  <div class="dashboard-wrapper">
    <div class="dashboard-container">

      <h2>📈 Temperature Trend</h2>
      <canvas id="tempChart" width="400" height="250"></canvas>

      <h2>🩺 Health Status Distribution</h2>
      <canvas id="statusChart" width="400" height="250"></canvas>

      <div class="analytics-box">
        <p><strong>Average Temperature:</strong> <span id="avgTemp">--</span> °C</p>
        <p><strong>Maximum Temperature:</strong> <span id="maxTemp">--</span> °C</p>
        <p><strong>Minimum Temperature:</strong> <span id="minTemp">--</span> °C</p>
      </div>

    </div>
  </div>

  <!-- Firebase Script -->
  <script type="module" src="script.js"></script>

</body>
</html>
